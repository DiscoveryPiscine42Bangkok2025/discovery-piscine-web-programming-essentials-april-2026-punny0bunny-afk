<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Basics</title>
    <style>
        body {
            /* Using DeepPink based on the specific exercise hint */
            background-color: deeppink;
            margin: 0;
            padding: 20px;
            font-family: sans-serif;
        }

        h1 {
            color: white;
            text-align: center;
            font-size: 3em;
        }

        .shop-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .shop-item {
            text-align: center;
        }

        .shop-item img {
            width: 200px;
            height: auto;
            display: block;
            margin-bottom: 10px;
        }

        hr {
            border: 0;
            border-top: 1px solid white;
            margin: 40px 0 20px 0;
            width: 100%;
        }

        .footer {
            text-align: right;
            font-style: italic;
            font-family: monospace;
            color: white;
        }
    </style>
</head>
<body>

    <!-- Title: White, centered, bigger, with a special character -->
    <h1>Welcome to the Shop! &copy;</h1>

    <!-- Two images side by side with links -->
    <div class="shop-container">
        <div class="shop-item">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a9/Amazon_logo.svg/960px-Amazon_logo.svg.png" alt="Shop 1">
            <a href="https://amazon.com" target="_blank">Visit Amazon</a>
        </div>
        <div class="shop-item">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/1b/EBay_logo.svg/3840px-EBay_logo.svg.png" alt="Shop 2">
            <a href="https://ebay.com" target="_blank">Visit eBay</a>
        </div>
    </div>

    <!-- Horizontal line -->
    <hr>

    <!-- Footer: Right aligned, italic, monospace, copyright, login, and year -->
    <div class="footer">
        &copy; login 2026
    </div>

</body>
</html>
