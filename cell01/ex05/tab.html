<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Exercise 05 - Tab</title>
    <style>
        /* CSS to style the table and cells */
        table {
            width: 100%;
            border-collapse: collapse; /* Removes space between borders */
        }
        td {
            height: 150px;           /* Sets the height of the boxes */
            padding: 10px;          /* Internal spacing for text */
            border: 1px solid #777; /* Adds a visible border */
            vertical-align: middle; /* Centers text vertically */
        }
        /* Custom colors for each box */
        .box1 {
            background-color: #bcc481; /* Olive/Greenish color from image */
            width: 50%;
        }
        .box2 {
            background-color: #f7bdad; /* Peach/Pinkish color from image */
            width: 50%;
        }
    </style>
</head>
<body>

    <table>
        <tr>
            <td class="box1">First cell</td>
            <td class="box2">Second cell</td>
        </tr>
    </table>

</body>
</html>
