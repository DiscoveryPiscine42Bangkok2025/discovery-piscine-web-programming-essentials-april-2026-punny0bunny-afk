<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Exercise 05: Tab</title>
    <style>
        /* This style ensures the table fills the width and cells have height */
        table {
            width: 100%;
            border-collapse: collapse;
            border: 1px solid black;
        }
        td {
            height: 100px;
            border: 1px solid black;
            padding: 10px;
            vertical-align: middle;
        }
        /* Custom colors as per your choice/the example image */
        .first-cell {
            background-color: #B2BD7E; /* Mossy Green */
            width: 50%;
        }
        .second-cell {
            background-color: #F8BFA8; /* Peach/Light Salmon */
            width: 50%;
        }
    </style>
</head>
<body>

    <table>
        <tr>
            <td class="first-cell">1</td>
            <td class="second-cell">2</td>
        </tr>
    </table>

</body>
</html>
