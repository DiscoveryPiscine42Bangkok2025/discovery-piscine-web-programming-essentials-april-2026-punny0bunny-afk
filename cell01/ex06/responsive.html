<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Responsive</title>

    <style>
        /*  เพิ่มใหม่ (ex06) */
        html, body {
            margin: 0;
            height: 100%;
        }

        /*  ปรับ table */
        table {
            width: 100%;
            height: 100vh;
            border-collapse: collapse;
            table-layout: fixed;
        }

        /* ของเดิมจาก ex05 */
        td {
            height: 150px;
            padding: 10px;
            border: 1px solid #777;
            vertical-align: middle;
        }

        .box1 {
            background-color: #bcc481;
            width: 50%;
        }

        .box2 {
            background-color: #f7bdad;
            width: 50%;
        }
    </style>

</head>

<body>

    <!-- มาจาก ex05 -->
    <table>
        <tr>
            <td class="box1">First cell</td>
            <td class="box2">Second cell</td>
        </tr>
    </table>

</body>
</html>
