<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Profile Card</title>
    <link rel="stylesheet" href="card.css">
</head>
<body>

    <div class="card">
        <!-- A title on top of your card -->
        <h2>User Profile</h2>

        <!-- An invisible table to align information -->
        <table class="profile-table">
            <tr>
                <td>
                    <!-- A profile picture -->
                    <img src="https://placeholder.com" alt="Profile Picture" class="avatar">
                    
                    <!-- Your login located under this picture -->
                    <p class="login">@jdoe_42</p>
                    
                    <!-- A 2-3 words description under your login -->
                    <p class="description">Software Engineering Student</p>
                </td>
            </tr>
            <tr>
                <td>
                    <!-- A few small images lined up for the social networks -->
                    <div class="socials">
                        <a href="#"><img src="https://placeholder.com" alt="Social 1"></a>
                        <a href="#"><img src="https://placeholder.com" alt="Social 2"></a>
                        <a href="#"><img src="https://placeholder.com" alt="Social 3"></a>
                    </div>
                </td>
            </tr>
        </table>

        <!-- A clickable button at the bottom of your card with the text 'Contact' -->
        <button type="button" class="contact-btn">Contact</button>
    </div>

</body>
</html>
