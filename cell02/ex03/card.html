<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile Card</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="card.css">
</head>
<body>

    <h2 class="page-title">User Profile Card</h2>

    <div class="card">
        <table class="invisible-table">
            <tr>
                <td>
                    <img src="https://preview.redd.it/ask-doodle-anything-v0-7jca6r3rzbje1.jpeg?width=1080&crop=smart&auto=webp&s=e74cbbd2a3bf00cf57016b4ed964a51cc554fe6a" alt="Profile Picture" class="profile-img">
                </td>
            </tr>
            <tr>
                <td>
                    <h1>อะไรก็ได้</h1>
                    <p class="description">CEO & Founder</p>
                    <p>ฮาวาดยูนีเวอซิตี่</p>
                </td>
            </tr>
            <tr>
                <td>
                    <div class="social-icons">
                        <a href="#"><i class="fa fa-dribbble"></i></a> 
                        <a href="#"><i class="fa fa-twitter"></i></a>  
                        <a href="#"><i class="fa fa-linkedin"></i></a>  
                        <a href="#"><i class="fa fa-facebook"></i></a> 
                    </div>
                </td>
            </tr>
            <tr>
                <td>
                    <button class="contact-btn">Contact</button>
                </td>
            </tr>
        </table>
    </div>

</body>
</html>
