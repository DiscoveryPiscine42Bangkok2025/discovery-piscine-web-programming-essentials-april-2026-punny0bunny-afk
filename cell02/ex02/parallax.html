<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parallax Exercise</title>
    <link rel="stylesheet" href="parallax.css">
</head>
<body>

    <!-- Section 1: First Background Image -->
    <div class="parallax img1">
        <div class="caption">
            <span class="border">WELCOME TO THE PAGE</span>
        </div>
    </div>

    <!-- Section 2: Black Block with Message -->
    <div class="dark-section">
        <h3>STORY SECTION</h3>
        <p>This is a black block with a message of your choice. As you scroll, the images above and below will feel like they are behind this layer.</p>
    </div>

    <!-- Section 3: Second Background Image -->
    <div class="parallax img2">
        <div class="caption">
            <span class="border">THE END OF THE SCROLL</span>
        </div>
    </div>

</body>
</html>
